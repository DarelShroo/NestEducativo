version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nestjs-educativo
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app/server:rw
      - ./public:/app/public:rw
      - ./exercises:/app/exercises:ro
    environment:
      - PORT=3001
